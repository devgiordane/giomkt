            type: integer
        - name: period
          in: query
          schema:
            type: string
            enum: ["7d", "30d", "90d"]
            default: "7d"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsStatsResponse"

  # Eduzz
  /api/eduzz/accounts:
    get:
      tags: [eduzz]
      summary: Listar contas Eduzz
      operationId: listEduzzAccounts
