    put:
      tags: [analytics]
      summary: Atualizar site
      operationId: updateSite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSiteBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSite"
    delete:
      tags: [analytics]
      summary: Excluir site
      operationId: deleteSite
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /api/analytics/stats:
    get:
      tags: [analytics]
      summary: Estatísticas de um site via Umami API
      operationId: getAnalyticsStats
      parameters:
        - name: site_id
          in: query
